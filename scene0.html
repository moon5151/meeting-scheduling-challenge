<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Scene 0 · 내 회의 시간 프로필</title>
<style>
:root{
  --ink:#111214;
  --muted:#6d7178;
  --line:#e5e7eb;
  --soft:#f7f8fa;
  --blue:#2f6df6;
  --blue-mid:#79a0ff;
  --blue-light:#c7d7ff;
  --busy:#2f3440;
}
*{box-sizing:border-box}
body{
  margin:0;background:#fff;color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",system-ui,sans-serif;
  letter-spacing:-.018em
}
button,input{font:inherit}
.page{
  width:min(1080px,calc(100% - 40px));
  margin:0 auto;
  padding:48px 0 96px
}
.eyebrow{font-size:13px;color:var(--muted);margin-bottom:12px}
h1{margin:0;font-size:40px;line-height:1.12;letter-spacing:-.04em}
.subtitle{margin:12px 0 34px;color:var(--muted);font-size:18px;line-height:1.55}
.toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  margin-bottom:18px
}

.week-nav{
  display:flex;
  align-items:center;
  gap:12px
}
.week-btn{
  width:34px;
  height:34px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  color:#525861;
  font-size:18px;
  display:grid;
  place-items:center;
  cursor:pointer
}
.week-label{
  min-width:64px;
  text-align:center;
  font-size:18px;
  font-weight:760
}

.toggle-wrap{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:14px;
  font-weight:700
}
.toggle{
  position:relative;width:46px;height:26px;
  border:0;border-radius:999px;background:#d9dde3;
  transition:.18s ease
}
.toggle::after{
  content:"";position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.2);transition:.18s ease
}
.toggle.on{background:var(--blue)}
.toggle.on::after{left:23px}
.calendar{
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  background:#fff
}
.calendar-head{
  display:grid;
  grid-template-columns:72px repeat(5,1fr);
  border-bottom:1px solid var(--line);
  background:#fbfbfc
}
.head-cell{
  padding:16px 12px;
  text-align:center;
  border-left:1px solid var(--line)
}
.head-cell:first-child{border-left:0}
.day{font-size:13px;font-weight:800}
.date{font-size:12px;color:var(--muted);margin-top:3px}
.calendar-body{
  display:grid;
  grid-template-columns:72px repeat(5,1fr)
}
.time-col{
  border-right:1px solid var(--line);
  background:#fbfbfc
}
.time-label{
  height:56px;
  padding:8px 10px 0 0;
  text-align:right;
  font-size:11px;
  color:#8a8f98;
  border-bottom:1px solid #f0f1f3
}
.day-col{
  position:relative;
  border-right:1px solid var(--line)
}
.day-col:last-child{border-right:0}
.slot{
  position:relative;
  height:56px;
  border-bottom:1px solid #f0f1f3;
  padding:5px
}
.pref{
  height:100%;
  border-radius:8px;
  position:relative
}
.pref.good{background:#8fb6ff}
.pref.possible{background:#c5d8ff}
.pref.avoid{background:#eceef1}
.dot-count{
  position:absolute;right:6px;top:6px;
  width:7px;height:7px;border-radius:50%;
  background:#808792
}

.busy-block{
  position:absolute;left:5px;right:5px;
  border-radius:8px;
  background:var(--busy);color:#fff;
  padding:7px 8px;
  font-size:11px;font-weight:700;
  line-height:1.35;
  z-index:3;
  box-shadow:0 3px 10px rgba(0,0,0,.12)
}
.busy-block.leave{background:#505866}
.legend{
  display:flex;gap:18px;flex-wrap:wrap;
  margin-top:16px;font-size:13px;color:var(--muted)
}
.legend-item{display:flex;align-items:center;gap:8px}
.swatch{width:16px;height:10px;border-radius:4px}
.swatch.good{background:#8fb6ff}
.swatch.possible{background:#c5d8ff}
.swatch.avoid{background:#eceef1;border:1px solid #d9dce1}
.swatch.busy{background:var(--busy)}
.note{
  margin-top:18px;padding:16px 18px;
  border:1px solid var(--line);
  border-radius:14px;background:var(--soft);
  color:var(--muted);font-size:13px;line-height:1.55
}

.start-action{
  width:min(560px,100%);
  margin:36px auto 0;
  padding:24px;
  border:1px solid var(--line);
  border-radius:18px;
  background:#fff;
  box-shadow:0 10px 28px rgba(18,24,40,.08)
}
.start-button{
  width:100%;
  min-height:54px;
  border:0;
  border-radius:14px;
  background:#111;
  color:#fff;
  font-weight:700;
  cursor:pointer
}


/* 과제 화면 구분 배지 */
.eyebrow{
  display:inline-flex;
  align-items:center;
  width:max-content;
  padding:7px 11px;
  border-radius:8px;
  font-weight:800;
  letter-spacing:-.01em;
}
.eyebrow.organizer{
  color:#245bcf;
  background:#eef4ff;
  border:1px solid #cfdcff;
}
.eyebrow.participant{
  color:#7047c7;
  background:#f4efff;
  border:1px solid #dfd1ff;
}
.eyebrow.common{
  color:#505762;
  background:#f3f4f6;
  border:1px solid #e0e2e6;
}


/* 프로토타입 화면 구분 헤더 */
.eyebrow{
  display:flex;
  width:100%;
  min-height:42px;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px 18px;
  margin-bottom:22px;
}

/* 요청된 색상 변경 */
.start-button{background:#3182F6}

/* 디테일 수정: 타임 가드 색상 및 캘린더 헤더 여백 */
.pref.good{background:#73A7F7}
.pref.possible{background:#D7E9FF}
.dot-count{background:#4C91F2}
.swatch.good{background:#73A7F7}
.swatch.possible{background:#D7E9FF}

.calendar{
  border:0;
  border-radius:0;
  overflow:visible;
  background:transparent;
}
.calendar-head{
  border-bottom:0;
  background:transparent;
  margin-bottom:12px;
}
.head-cell{
  border-left:0;
  padding:10px 12px 14px;
}
.time-col{
  border-right:0;
  background:transparent;
  padding-right:10px;
}
.time-label{
  border-bottom:0;
  padding-right:4px;
}
.day-col{
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.calendar-body > .day-col:nth-child(2){
  border-left:1px solid var(--line);
  border-radius:18px 0 0 18px;
  overflow:hidden;
}
.calendar-body > .day-col:last-child{
  border-right:1px solid var(--line);
  border-radius:0 18px 18px 0;
  overflow:hidden;
}
</style>
</head>
<body>
<main class="page">
  <div class="eyebrow common">회의 참여자 공통 화면 </div>
  <h1>회의하기 좋은 시간을 설정해요</h1>
  <div class="subtitle">셀을 누르거나 드래그해서 회의하기 좋은 시간과 피하고 싶은 시간을 설정하면, 회의 시간을 추천할 때 반영해요.</div>

  <div class="toolbar">
    <div class="week-nav">
      <button class="week-btn" type="button" aria-label="지난주">‹</button>
      <div class="week-label">이번주</div>
      <button class="week-btn" type="button" aria-label="다음주">›</button>
    </div>
    <div class="toggle-wrap">
      <span>예약된 일정 보기 </span>
      <button class="toggle" id="scheduleToggle" type="button" aria-label="일정 함께 보기"></button>
    </div>
  </div>

  <section class="calendar">
    <div class="calendar-head">
      <div class="head-cell"></div>
      <div class="head-cell"><div class="day">월</div><div class="date">7/6</div></div>
      <div class="head-cell"><div class="day">화</div><div class="date">7/7</div></div>
      <div class="head-cell"><div class="day">수</div><div class="date">7/8</div></div>
      <div class="head-cell"><div class="day">목</div><div class="date">7/9</div></div>
      <div class="head-cell"><div class="day">금</div><div class="date">7/10</div></div>
    </div>

    <div class="calendar-body">
      <div class="time-col">
        <div class="time-label">09:00</div><div class="time-label">10:00</div>
        <div class="time-label">11:00</div><div class="time-label">12:00</div>
        <div class="time-label">13:00</div><div class="time-label">14:00</div>
        <div class="time-label">15:00</div><div class="time-label">16:00</div>
        <div class="time-label">17:00</div>
      </div>

      <div class="day-col" data-day="mon">
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref good"><span class="dot-count"></span></div></div>
        <div class="slot"><div class="pref good"><span class="dot-count"></span></div></div>
        <div class="slot"><div class="pref avoid"></div></div>
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref good"><span class="dot-count"></span></div></div>
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref avoid"></div></div>
      </div>

      <div class="day-col" data-day="tue">
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref possible"><span class="dot-count"></span></div></div>
        <div class="slot"><div class="pref avoid"><span class="dot-count"></span></div></div>
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref avoid"></div></div>
      </div>

      <div class="day-col" data-day="wed">
        <div class="slot"><div class="pref possible"><span class="dot-count"></span></div></div>
        <div class="slot"><div class="pref possible"><span class="dot-count"></span></div></div>
        <div class="slot"><div class="pref good"><span class="dot-count"></span></div></div>
        <div class="slot"><div class="pref avoid"></div></div>
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref avoid"></div></div>
      </div>

      <div class="day-col" data-day="thu">
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref avoid"></div></div>
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref good"><span class="dot-count"></span></div></div>
        <div class="slot"><div class="pref good"><span class="dot-count"></span></div></div>
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref avoid"></div></div>
      </div>

      <div class="day-col" data-day="fri">
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref avoid"></div></div>
        <div class="slot"><div class="pref possible"><span class="dot-count"></span></div></div>
        <div class="slot"><div class="pref good"></div></div>
        <div class="slot"><div class="pref possible"></div></div>
        <div class="slot"><div class="pref avoid"></div></div>
        <div class="slot"><div class="pref avoid"></div></div>
      </div>
    </div>
  </section>

  <div class="legend">
    <div class="legend-item"><span class="swatch good"></span>좋아요</div>
    <div class="legend-item"><span class="swatch possible"></span>가능해요</div>
    <div class="legend-item"><span class="swatch avoid"></span>피하고 싶지만 가능해요</div>
    <div class="legend-item schedule-only" style="display:none"><span class="swatch busy"></span>불가능해요</div>
  </div>

  
  <div class="start-action">
    <button class="start-button" id="createMeetingButton" type="button">새 회의 만들기</button>
  </div>
</main>

<script>
const toggle=document.getElementById("scheduleToggle");
let showing=false;

const scheduleBlocks=[
  {day:"mon",top:56,height:112,label:"주간회의"},
  {day:"mon",top:280,height:56,label:"점심 미팅"},
  {day:"tue",top:112,height:112,label:"외부 미팅"},
  {day:"wed",top:0,height:168,label:"연차"},
  {day:"thu",top:280,height:112,label:"고객사 회의"},
  {day:"fri",top:224,height:56,label:"점심 약속"}
];

function renderSchedules(){
  document.querySelectorAll(".busy-block").forEach(el=>el.remove());
  document.querySelectorAll(".schedule-only").forEach(el=>el.style.display=showing?"flex":"none");

  if(!showing) return;

  scheduleBlocks.forEach(item=>{
    const col=document.querySelector(`[data-day="${item.day}"]`);
    const block=document.createElement("div");
    block.className="busy-block"+(item.label==="연차"?" leave":"");
    block.style.top=`${item.top+5}px`;
    block.style.height=`${item.height-10}px`;
    block.textContent=item.label;
    col.appendChild(block);
  });
}

toggle.addEventListener("click",()=>{
  showing=!showing;
  toggle.classList.toggle("on",showing);
  renderSchedules();
});

document.getElementById("createMeetingButton").addEventListener("click",()=>{location.href="scene1.html";});
</script>
</body>
</html>
