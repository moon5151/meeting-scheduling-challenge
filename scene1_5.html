<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>일정 분석 중</title>
<style>
:root{
  --ink:#111214;
  --muted:#6d7178;
  --line:#e5e7eb;
  --soft:#f7f8fa;
  --blue:#2f6df6;
  --blue-soft:#eef4ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:#fff;
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",system-ui,sans-serif;
  letter-spacing:-.018em;
}
.page{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:32px;
}
.card{
  width:min(560px,100%);
  border:1px solid var(--line);
  border-radius:22px;
  padding:40px;
  background:#fff;
  box-shadow:0 14px 36px rgba(18,24,40,.08);
}
.eyebrow{
  font-size:13px;
  color:var(--muted);
  margin-bottom:12px;
}
h1{
  margin:0;
  font-size:34px;
  line-height:1.18;
  letter-spacing:-.04em;
}
.subtitle{
  margin:12px 0 30px;
  color:var(--muted);
  font-size:16px;
  line-height:1.55;
}
.steps{
  display:grid;
  gap:12px;
}
.step{
  display:flex;
  align-items:center;
  gap:14px;
  min-height:58px;
  padding:0 16px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
  color:#8b9098;
  transition:.28s ease;
}
.step.active{
  border-color:#b9caf3;
  background:#f8fbff;
  color:#315cae;
}
.step.done{
  border-color:#d8e3fb;
  background:var(--blue-soft);
  color:#244f9f;
}
.icon{
  width:28px;
  height:28px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:#eef0f3;
  color:#8b9098;
  font-size:13px;
  font-weight:800;
}
.step.active .icon{
  background:#dce8ff;
  color:var(--blue);
}
.step.done .icon{
  background:var(--blue);
  color:#fff;
}
.label{
  font-size:15px;
  font-weight:700;
}
.progress{
  height:6px;
  margin-top:28px;
  border-radius:999px;
  background:#eef0f3;
  overflow:hidden;
}
.progress-bar{
  width:0;
  height:100%;
  background:var(--blue);
  border-radius:999px;
  transition:width .5s ease;
}
.note{
  margin-top:16px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

/* 과제 화면 구분 배지 */
.eyebrow{
  display:inline-flex;
  align-items:center;
  width:max-content;
  padding:7px 11px;
  border-radius:8px;
  font-weight:800;
  letter-spacing:-.01em;
}
.eyebrow.organizer{
  color:#245bcf;
  background:#eef4ff;
  border:1px solid #cfdcff;
}
.eyebrow.participant{
  color:#7047c7;
  background:#f4efff;
  border:1px solid #dfd1ff;
}
.eyebrow.common{
  color:#505762;
  background:#f3f4f6;
  border:1px solid #e0e2e6;
}


/* 프로토타입 화면 구분 헤더 */
.eyebrow{
  display:flex;
  width:100%;
  min-height:42px;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px 18px;
  margin-bottom:22px;
}

/* 요청된 색상 변경 */
.eyebrow.organizer{color:#0B6B3A;background:#EAFBF2;border-color:#B7E7CC}
</style>
</head>
<body>
<main class="page">
  <section class="card">
    <div class="eyebrow organizer">회의 주최자 화면</div>
    <h1>회의 일정을 찾고 있어요.</h1>
    <div class="subtitle">참여자의 일정과 선호하는 시간을 함께 살펴보고 있어요.</div>

    <div class="steps">
      <div class="step active" data-step="0">
        <div class="icon">1</div>
        <div class="label">참여자 일정 확인 하기</div>
      </div>
      <div class="step" data-step="1">
        <div class="icon">2</div>
        <div class="label">선호하는 시간 살펴보기</div>
      </div>
      <div class="step" data-step="2">
        <div class="icon">3</div>
        <div class="label">필수 참여자 먼저 보기</div>
      </div>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="note" id="note">참여자의 가능한 시간을 확인하고 있어요.</div>
  </section>
</main>

<script>
const steps=[...document.querySelectorAll(".step")];
const notes=[
  "참여자의 가능한 시간을 확인하고 있어요.",
  "반복되는 선호하는 시간을 함께 살펴보고 있어요.",
  "필수 참여자가 모두 가능한 시간을 정리하고 있어요.",
  ""
];
const progress=document.getElementById("progressBar");
const note=document.getElementById("note");
let current=0;

function update(){
  steps.forEach((step,index)=>{
    step.classList.toggle("done",index<current);
    step.classList.toggle("active",index===current && current<steps.length);
    if(index<current) step.querySelector(".icon").textContent="✓";
  });
  progress.style.width=`${Math.min(current+1,3)/3*100}%`;
  note.textContent=notes[current];
}

update();

const timer=setInterval(()=>{
  current++;
  if(current>=3){
    clearInterval(timer);
    steps.forEach(step=>{
      step.classList.remove("active");
      step.classList.add("done");
      step.querySelector(".icon").textContent="✓";
    });
    progress.style.width="100%";
    note.textContent="";
    setTimeout(()=>{location.href="scene2.html";},500);
    return;
  }
  update();
},900);
</script>
</body>
</html>
