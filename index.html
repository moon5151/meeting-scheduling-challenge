<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>회의 일정 조율 경험 설계</title>

<style>
:root{
  --ink:#191F28;
  --muted:#8B95A1;
  --line:#E5E8EB;
  --bg:#F9FAFB;
  --primary:#3182F6;
  --primary-hover:#1B64DA;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",system-ui,sans-serif;
}

main{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:40px 24px;
}

.card{
  width:min(500px,100%);
  padding:56px 48px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:0 4px 18px rgba(18,24,40,.06);
}

.eyebrow{
  font-size:14px;
  font-weight:600;
  color:var(--muted);
  letter-spacing:.02em;
  margin-bottom:20px;
}

h1{
  margin:0;
  font-size:30px;
  font-weight:700;
  line-height:1.35;
  letter-spacing:-0.03em;
}

p{
  margin:18px 0 44px;
  font-size:15px;
  font-weight:500;
  color:var(--muted);
}

a{
  display:block;
  width:100%;
  min-height:56px;
  line-height:56px;
  text-align:center;
  text-decoration:none;
  background:var(--primary);
  color:#fff;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  transition:.2s;
}

a:hover{
  background:var(--primary-hover);
}
</style>
</head>

<body>

<main>

<section class="card">

<div class="eyebrow">
토스 Product Designer Challenge 2026
</div>

<h1>
회의 일정 조율 경험 설계
</h1>

<p>
김문정
</p>

<a href="scene0.html">
프로토타입 시작하기
</a>

</section>

</main>

</body>
</html>
