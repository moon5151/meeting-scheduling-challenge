<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AutoSlot Prototype</title>
<style>
:root{--ink:#111214;--muted:#6d7178;--line:#e5e7eb}
*{box-sizing:border-box}
body{margin:0;background:#f7f8fa;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",system-ui,sans-serif}
main{min-height:100vh;display:grid;place-items:center;padding:32px}
.card{width:min(640px,100%);padding:44px;border:1px solid var(--line);border-radius:24px;background:#fff;box-shadow:0 16px 42px rgba(18,24,40,.09)}
.eyebrow{font-size:13px;color:var(--muted);margin-bottom:12px}
h1{margin:0;font-size:42px;letter-spacing:-.04em}
p{margin:14px 0 30px;color:var(--muted);font-size:17px;line-height:1.6}
a{display:block;min-height:56px;padding:17px;border-radius:14px;background:#111;color:#fff;text-decoration:none;text-align:center;font-weight:700}
</style>
</head>
<body>
<main>
<section class="card">
<div class="eyebrow">UX 과제 프로토타입</div>
<h1>AutoSlot</h1>
<p>선호하는 시간과 실제 일정을 함께 고려해 모두에게 괜찮은 회의 시간을 찾아요.</p>
<a href="scene0.html">프로토타입 시작하기</a>
</section>
</main>
</body>
</html>
