<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AutoSlot Prototype</title>
<style>
:root{--ink:#111214;--muted:#6d7178;--line:#e5e7eb}
*{box-sizing:border-box}
body{margin:0;background:#f7f8fa;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",system-ui,sans-serif}
main{min-height:100vh;display:grid;place-items:center;padding:32px}
.card{
width:min(500px,100%);
padding:56px 48px;
border:1px solid var(--line);
border-radius:20px;
background:#fff;
box-shadow:0 4px 18px rgba(18,24,40,.06);
}
.eyebrow{
font-size:14px;
font-weight:600;
color:#8B95A1;
margin-bottom:18px;
letter-spacing:.02em;
}
h1{
margin:0;
font-size:30px;
font-weight:700;
line-height:1.35;
letter-spacing:-.03em;
}
p{margin:14px 0 30px;color:var(--muted);font-size:17px;line-height:1.6}
a{display:block;min-height:56px;padding:17px;border-radius:14px;background:#111;color:#fff;text-decoration:none;text-align:center;font-weight:700}
</style>
</head>
<body>
<main>
<section class="card">
  <div class="eyebrow">토스 Product Designer Challenge 2026</div>

  <h1>회의 일정을<br>결정하는 경험 설계</h1>

  <p>김문정</p>

  <a href="scene0.html">프로토타입 시작하기</a>
</section>
</main>
</body>
</html>
